  <style>
    .dropdown {
  position: relative;
  display: inline-block;
}

/* Style the toggle link */
.dropdown-toggle {
  cursor: pointer;
  padding: 10px;
  font-weight: bold;
  text-decoration: none;
  color: #333;
}

/* Hide dropdown menu by default */
.dropdown-menu {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  background-color: #fff;
  box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
  list-style-type: none;
  padding: 0;
  margin: 0;
  min-width: 160px;
  z-index: 1;
}

/* Show dropdown on hover of dropdown or toggle */
.dropdown:hover .dropdown-menu,
.dropdown-toggle:hover + .dropdown-menu {
  display: block;
}

/* Style for each dropdown item */
.dropdown-item {
  padding: 8px 16px;
  color: #333;
  text-decoration: none;
  display: block;
}

.dropdown-item:hover {
  background-color: #f0f0f0;
}
  </style>
</head>
