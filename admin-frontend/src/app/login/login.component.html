<div class="loginPage">
    <div class="login-main">

        <div class="login-inner">
            <div class="login-mn">
                <div class="logo">
                    <img src="assets/logo/{{hostname}}.png" alt="img">
                </div>
                <div class="col-inner right">
                    <!-- alert -->
                    <div *ngIf="res_error" class="alert alert-danger" role="alert">
                        {{res_error}}
                    </div>

                    <div class="form-div">
                        <form [formGroup]='Form' (ngSubmit)='onSubmitLogin()'>
                            <div class="login-title">
                                <h2 class="text-center">Sign In</h2>
                            </div>
                            <div class="form-group username">
                                <label class="form-label">Username</label>
                                <div class="input-icons">
                                    <i class="fa fa-user-o icon"></i>
                                    <input type="text" placeholder="Username" class="form-control"
                                        formControlName='username'>
                                </div>
                            </div>
                            <div class="form-group inner-addon right-addon">
                                <label class="form-label">Password</label>
                                <div class="input-group">
                                    <input [type]="showPassword ? 'text' : 'password'" placeholder="Password"
                                        class="form-control" formControlName='password' id="password-field">
                                    <div>
                                        <i alt="show" class="fa fa-eye eye-show" (click)="showPassword = !showPassword"
                                            [class.hide]="showPassword"></i>
                                        <i alt="hide" class="fa fa-eye-slash eye-hide"
                                            (click)="showPassword = !showPassword" [class.hide]="!showPassword"></i>
                                    </div>
                                </div>

                            </div>

                            <div class="btn-list">
                                <button type="submit" class="btn " [disabled]="loginButtonDisable">Login <i
                                        class="fa fa-sign-in icon"></i></button>
                            </div>

                        </form>
                    </div>
                </div>
                <!-- <div class="log-copys">
                    <p>© <span>{{ hostname | uppercase }}</span>&nbsp;
                        <a href="mailto:info@starexch.com" class="mail-link">info@{{hostname}}.com</a>
                    </p>
                </div> -->

            </div>

        </div>

    </div>
</div>
