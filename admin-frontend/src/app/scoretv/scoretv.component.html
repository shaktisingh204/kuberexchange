<app-header></app-header>
<!-- <app-sidebar></app-sidebar> -->

<main>
    <div class="full-wrap">
        <div class="report-page">
            <div class="bet-history inner-content">
                <div class="page-title">
                    <h3>Socre & TV</h3>
                    <div class="breadcrumb">
                        <a (click)="goToBack()" class="btn btn-secondary back-btn"><i
                                class="fa fa-arrow-left"></i>Back</a>
                    </div>
                </div>


               
                <div class="filter-tab">

                    <div class="tab-content" id="nav-tabContent">
                        <div class="tab-pane fade show active" id="nav-all">
                            <div class="report-table">
                                <table datatable class="table">
                                   
                                    <tbody>
                                        
                                            <tr>
                                              <td>Match-Id:</td>
                                                <td>
                                                  <input _ngcontent-c8="" type="number"
                                                  class="input-text ng-untouched ng-pristine ng-valid box-size" [(ngModel)]="matchId"
                                                  class="input-text"
                                                  style="color:black;font-size: 16px;width:100px; margin-right: 10px;">
                                                </td>
                                                <td>
                                                  <button type="button" class="btn-info td-btn"
                                                        (click)="getScore()">Submit</button>
                                                </td>
                                               
                                            </tr>
                                    </tbody>
                                    <tbody *ngIf="scoredata == true">
                                      <tr>
                                        <td>
                                          Score:
                                        </td>
                                        <td>
                                          {{scroeTv?.scoreUrl}}
                                        </td>
                                      </tr>
                                      <tr>
                                        <td>
                                          Tv:
                                        </td>
                                        <td>
                                          {{scroeTv?.streamingUrl}}
                                        </td>
                                      </tr>
                                    </tbody>

                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
