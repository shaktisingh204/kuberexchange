<main>

                    </div>

                                <td>{{profit?.gameId}}</td>

                                    <button type="button" class="btn btn-sm btn-success"

                                No data avalible

                            <tr>
                                <td></td>
                                <td *ngIf="type == 0"></td>
                                <td>Total </td>
                                <td [ngClass]="{'red':total < 0 ,'green':total >= 0}"> {{total | number :
                                    '0.0-2'}}</td>
                         </tr>
                        </tbody> -->
                    </table> 
                    <div class="row" *ngIf="userPlList.length == 0">
                        <div class="col-md-12 text-center p-0">
                            
                            <div class="nodatats">
                                <span> No data avalible </span> 
                            </div>
                        </div>
                    </div>
                    <!-- <pagination-controls (pageChange)="pageChange($event)"
                                                class="user-list-pagination" ></pagination-controls> -->
                </div>
                <div class="row-sm d-flex mt-1">
                    <div class="col-md-6">
                        <span>Showing <span>0</span> to <span>0</span> of <span>0</span> entries</span>
                    </div>
                    <div class="col-md-6">
                        <pagination-controls (pageChange)="pageChange($event)" class="user-list-pagination"></pagination-controls>  
                        <!-- <nav aria-label="Page navigation example">
                            <ul class="pagination justify-content-end">
                              <li class="page-item " style="margin-right: 5px;">
                                <a  style="background-color:#0088cc !important; color: #fff;" class="page-link"  (pageChange)="pageChange($event)" tabindex="-1">Previous</a>
                              </li> -->
                              <!-- <li *ngIf="userPlList.length == 0" class="page-item"><a class="page-link" href="#">1</a></li>
                              <li *ngIf="userPlList.length == 0" class="page-item"><a class="page-link" href="#">2</a></li>
                              <li *ngIf="userPlList.length == 0" class="page-item"><a class="page-link" href="#">3</a></li> -->
                              <!-- <li  class="page-item">
                                <a class="page-link"  (pageChange)="pageChange($event)"  style="background-color:#0088cc !important; color: #fff;">Next</a>

                            </ul>
                          </nav> -->
                        <!-- <pagination-controls (pageChange)="pageChange($event)" class="user-list-pagination"></pagination-controls>  -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>


<!-- Date Time Picker -->
<ng-template #popTemplate>
    <datepicker [hidden]="!isDateVisible" [(ngModel)]="date" [minDate]="minDate" [maxDate] ="todayDateTime" [showWeeks]="false"
        (ngModelChange)="updateDate()" (selectionDone)="dateSelectionDone()">
    </datepicker>
    <timepicker [hidden]="!isDateVisible" [(ngModel)]="time" (ngModelChange)="updateTime()" showSeconds="true" [showMeridian]="isMeridian">
    </timepicker>

    <div style="padding:5px">
        <span class="btn-group pull-left" style="margin-right:10px;">
            <button type=button class="btn btn-sm btn-info" [hidden]="!isDateVisible" (click)="today()">Today</button>
            <button type=button class="btn btn-sm btn-danger" (click)="clear()">Clear</button>
        </span>
        <span class="btn-group pull-right">
            <!-- <button type=button class="btn btn-sm btn-light" [hidden]="isDateVisible" 
            (click)="showDate()">Date
            </button>
            <button type=button class="btn btn-sm btn-light" [hidden]="!isDateVisible" 
            (click)="showTime()">Time
            </button> -->
            <button type=button class="btn btn-sm btn-success" (click)="close()">Close</button>
        </span> <span class=clearfix></span>
    </div>
</ng-template>

<ng-template #popTemplate1>
    <datepicker [hidden]="!isDateVisible" [(ngModel)]="endDate" [minDate]="date" [maxDate] ="todayDateTime" [showWeeks]="false"
        (ngModelChange)="updateEndDate()" (selectionDone)="dateSelectionDone()">
    </datepicker>
    <timepicker [hidden]="!isDateVisible" [(ngModel)]="endTime" (ngModelChange)="updateEndTime()"
        [showMeridian]="isMeridian" showSeconds="true">
    </timepicker>

    <div style="padding:5px">
        <span class="btn-group pull-left" style="margin-right:10px;">
            <button type=button class="btn btn-sm btn-info" [hidden]="!isDateVisible" (click)="today()">Today</button>
            <button type=button class="btn btn-sm btn-danger" (click)="clear()">Clear</button>
        </span>
        <span class="btn-group pull-right">
            <!-- <button type=button class="btn btn-sm btn-light" [hidden]="isDateVisible" 
            (click)="showDate()">Date
            </button>
            <button type=button class="btn btn-sm btn-light" [hidden]="!isDateVisible" 
            (click)="showTime()">Time
            </button> -->
            <button type=button class="btn btn-sm btn-success" (click)="closeEndDatepicker()">Close</button>
        </span> <span class=clearfix></span>
    </div>
</ng-template>

<ng-template #userParentList>
    <div class="modal-header">
        <h4 class="modal-title">Parent List of {{userParentName}}</h4>
        <a type="button" class="close" data-dismiss="modal" (click)="modalRef.hide()"><i class="fa fa-times"></i></a>
    </div>
    <table class="table">
        <tbody>
            <ng-container *ngFor="let parent of parentList; let i =index">
                <tr>
                    <td>{{parent?.name}}({{parent?.user_name}})</td>
                </tr>
                <!-- <tr>
                    <td>user2</td>
                </tr>
                <tr>
                    <td>user3</td>
                </tr> -->
                
            </ng-container>
        </tbody>
    </table>
</ng-template>

<!-- iframe_model -->
<ng-template #iframe_model>
    <div class="modal-header">
        <h4 class="modal-title">Result</h4>
        <a type="button" class="close" data-dismiss="modal" (click)="modalRef.hide()"><i class="fa fa-times"></i></a>
    </div>
    <iframe id="fp_embed_player" [src]="iframeUrl" marginwidth="0"
    marginheight="0" frameborder="0" width="100%" height="100%"
    scrolling="yes" allowfullscreen="allowfullscreen"></iframe>
</ng-template>
